name: Build, Test & Deploy

on:
  push:
    branches: [main, master]
    # Skip rebuilds for changes that don't affect the published site
    paths-ignore:
      - .gitignore
      - .editorconfig
      - .gitattributes
      - LICENSE
      - README.md
      - CLAUDE.md
      - REQUIREMENTS.md
  workflow_dispatch: # allow manual runs from the Actions tab

# Least-privilege token scopes required for Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; cancel superseded in-progress runs
concurrency:
  group: pages
  cancel-in-progress: true

env:
  RUBY_VERSION: "3.3"

jobs:
  # ── Stage 1 ─ Build the static site ───────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history — the posts-lastmod plugin reads `git log`

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ env.RUBY_VERSION }}
          bundler-cache: true # cache + auto bundle install

      - name: Cache Jekyll build
        uses: actions/cache@v4
        with:
          path: .jekyll-cache
          key: jekyll-${{ hashFiles('_config.yml', '_plugins/**', 'Gemfile.lock') }}-${{ github.sha }}
          restore-keys: |
            jekyll-${{ hashFiles('_config.yml', '_plugins/**', 'Gemfile.lock') }}-
            jekyll-

      - name: Build (production)
        run: bundle exec jekyll build -d "_site${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: production

      - name: Upload build output
        uses: actions/upload-artifact@v4
        with:
          name: site
          path: "_site${{ steps.pages.outputs.base_path }}"
          retention-days: 1

  # ── Stage 2 ─ Validate the built HTML (deploy gate) ───────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10
    steps:
      - name: Checkout # needed for the Gemfile (html-proofer)
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ env.RUBY_VERSION }}
          bundler-cache: true

      - name: Download build output
        uses: actions/download-artifact@v4
        with:
          name: site
          path: _site

      - name: HTML-Proofer (broken links, images, scripts)
        run: |
          bundle exec htmlproofer _site \
            --disable-external \
            --ignore-urls "/^http:\/\/127.0.0.1/,/^http:\/\/0.0.0.0/,/^http:\/\/localhost/"

  # ── Stage 3 ─ Deploy to GitHub Pages (only if build + test pass) ──────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download build output
        uses: actions/download-artifact@v4
        with:
          name: site
          path: _site

      - name: Package Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4

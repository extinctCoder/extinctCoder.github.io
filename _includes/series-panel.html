<!-- Series panel: on a post with `series:`, list the parts in the right sidebar
     (replacing "Recently Updated"). Styled to match the TOC via the small block
     in assets/css/jekyll-theme-chirpy.scss (#access-series). Must be a plain
     include (not include_cached) — it depends on the per-page `series`. -->

{% assign parts = site.posts | where: "series", page.series | sort: "date" %}

{% if parts.size > 1 %}
  <section id="access-series">
    <h2 class="panel-heading">{{ page.series }}</h2>
    <ul class="list-unstyled ps-0 pb-1 ms-1 mt-2">
      {% for post in parts %}
        <li class="lh-lg">
          <a class="d-block text-truncate" href="{{ post.url | relative_url }}"{% if post.url == page.url %} aria-current="page"{% endif %}>{{ forloop.index }}. {{ post.title }}</a>
        </li>
      {% endfor %}
    </ul>
  </section>
  <!-- #access-series -->
{% endif %}

# =============================================================================
#  SITE IDENTITY — who the site is and where it lives
# =============================================================================
theme: jekyll-theme-chirpy
lang: en
timezone: Asia/Dhaka
title: Sabbir Ahmed Shourov # shown in the sidebar header & browser tab
tagline: Senior Backend Engineer · Robotics & AI Enthusiast 🤖 # subtitle under the title
description: >- # used for SEO meta + link-preview text
  Senior Backend Engineer specializing in APIs, microservices, and DevOps — sharing real-world projects and lessons in backend engineering. Robotics & AI enthusiast 🤖
url: "https://extinctCoder.github.io"
baseurl: "" # keep empty for a username.github.io site

# =============================================================================
#  PROFILE & SOCIAL — sidebar identity and contact links
# =============================================================================
github:
  username: extinctCoder
social:
  name: Sabbir Ahmed Shourov # author byline on posts + footer copyright
  email: write2shourov@gmail.com
  links:
    - https://www.linkedin.com/in/extinctCoder
    - https://github.com/extinctCoder
avatar: https://avatars.githubusercontent.com/u/16348041?v=4 # sidebar profile photo

# =============================================================================
#  SEO & SEARCH ENGINES — ownership verification + social link previews
# =============================================================================
webmaster_verifications:
  google: tT60UR4nmrbtWxmkhbvr6AYBm0xnE2Q335p3wfD8L4o # Google Search Console
social_preview_image: /assets/img/social-preview.png # og:image shown when links are shared

# =============================================================================
#  ANALYTICS — visitor statistics
# =============================================================================
analytics:
  google:
    id: G-YLL6CDRX2M # Google Analytics (GA4)
  goatcounter:
    id: extinctcoder # GoatCounter (privacy-friendly + on-page view counts)
pageviews:
  provider: goatcounter # on-page per-post view counter (goatcounter only)

# =============================================================================
#  APPEARANCE — theme + content display
# =============================================================================
theme_mode: # empty = follow the visitor's system preference [light | dark]
toc: true # global switch for the table of contents on posts

# =============================================================================
#  COMMENTS — giscus (comments stored as GitHub Discussions)
# =============================================================================
comments:
  provider: giscus
  giscus:
    repo: extinctCoder/extinctCoder.github.io
    repo_id: R_kgDOL64i_w
    category: Comments
    category_id: DIC_kwDOL64i_84CfWCA

# =============================================================================
#  PWA — installable Progressive Web App + offline cache
# =============================================================================
pwa:
  enabled: true
  cache:
    enabled: true
    deny_paths: # paths to exclude from the PWA cache (none)

# =============================================================================
#  CONTENT & PAGINATION
# =============================================================================
paginate: 10 # posts per page on the home feed

# =============================================================================
#  ADVANCED — theme internals. Not recommended to modify.
# =============================================================================

# --- Markdown engine (kramdown) + code highlighting (Rouge) ---
kramdown:
  footnote_backlink: "&#8617;&#xfe0e;"
  syntax_highlighter: rouge
  syntax_highlighter_opts: # Rouge Options › https://github.com/jneen/rouge#full-options
    css_class: highlight
    # default_lang: console
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

# --- Custom collections (nav tabs + the projects showcase) ---
collections:
  tabs:
    output: true
    sort_by: order
  projects:
    output: true
    sort_by: order

# --- Default front matter applied per content type ---
defaults:
  # Blog posts
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: true
      toc: true
      permalink: /posts/:title/ # do not change without updating all post links
  # Drafts — no comments
  - scope:
      path: _drafts
    values:
      comments: false
  # Navigation tabs
  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/
  # Project showcase
  - scope:
      path: ""
      type: projects
    values:
      layout: project
      permalink: /projects/:title/
      comments: false
      panel: false # hide the blog feed panels (Recently Updated / Trending Tags)
  # Theme JS assets — service-worker cache
  - scope:
      path: assets/js/dist
    values:
      swcache: true

# --- Output minification ---
sass:
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

# --- Files kept out of the built site ---
exclude:
  - "*.gem"
  - "*.gemspec"
  - docs
  - tools
  - README.md
  - CLAUDE.md # internal AI-guidance doc — keep out of the public site
  - REQUIREMENTS.md # internal dev-setup notes — keep out of the public site
  - LICENSE
  - "*.config.js"
  - package*.json

# --- Auto-generated category & tag pages ---
jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/

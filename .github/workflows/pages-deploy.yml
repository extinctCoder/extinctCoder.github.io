name: Build & Deploy

on:
  push:
    branches: [main, master]
    # Skip rebuilds for changes that don't affect the published site
    paths-ignore:
      - .gitignore
      - .editorconfig
      - .gitattributes
      - LICENSE
      - README.md
      - CLAUDE.md
      - REQUIREMENTS.md
  workflow_dispatch: # allow manual runs from the Actions tab

# Least-privilege scopes required for Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Serialize with the vault sync (same group) so the two never deploy to Pages at
# once. Don't cancel in flight — a running sync may be mid content-commit.
concurrency:
  group: pages-deploy
  cancel-in-progress: false

env:
  RUBY_VERSION: "3.3"

jobs:
  # ── Build + validate, then hand the artifact to deploy ────────────────────
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history — the posts-lastmod plugin reads `git log`

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ env.RUBY_VERSION }}
          bundler-cache: true # cache gems + auto `bundle install`

      - name: Validate content shape # fail fast on malformed post/project front matter
        run: ruby tools/validate-content.rb

      - name: Cache Jekyll build
        uses: actions/cache@v4
        with:
          path: .jekyll-cache
          key: jekyll-${{ hashFiles('_config.yml', 'Gemfile.lock', '_plugins/**') }}
          restore-keys: jekyll-

      - name: Build (production)
        run: bundle exec jekyll build -d "_site${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: production

      - name: Test — HTML-Proofer (broken links, images, scripts)
        run: |
          bundle exec htmlproofer _site \
            --disable-external \
            --ignore-urls "/^http:\/\/127.0.0.1/,/^http:\/\/0.0.0.0/,/^http:\/\/localhost/"

      # The only artifact in the pipeline — consumed directly by deploy-pages
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "_site${{ steps.pages.outputs.base_path }}"

  # ── Deploy the already-built artifact (no rebuild, no re-download) ─────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
